<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>ILY AARAV</title>
        <style>
        
            body, html {
            margin: 0;
            height: 100%; 
            }
        
            
            .container {
            display: flex;
            justify-content: center;
            align-items: center;   
            min-height: 100vh;      
            background-image: url('backgroundimg.png');
            }
        
            .tile {
    width: 600px;
    aspect-ratio: 1 / 1;
    background-color: #d400ff;
    background-size: cover;       
    background-position: center;  
    background-repeat: no-repeat; 

    border-radius: 16px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    padding: 20px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
    text-align: center;
    overflow: hidden;

    color: white; 
    text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.8);
    }
    .picture {
        width: 600px;
        height: 400px;
        border-radius: 15px;
        margin-bottom: 10px;
        object-fit: cover;
    }
            .apologyButton {
            padding: 15px 30px;
            font-size: 1.2rem;
            color: #fff;
            background-color: #b84684;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .button-container {
        display: flex;
        gap: 10px; /* Adds space between the buttons */
        justify-content: center; /* Centers the buttons horizontally */
        margin-top: 0px; /* Optional: Adds space above the buttons */
    }
    button {
        padding: 10px 20px;
        background-color: black;
        color: white;
        font-size: 1rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="tile">
                <img class="picture" src="puppy_eyes.jpeg" alt="me"/>
                <h1 style="font-family: cursive;color: black; font-size: 1000;line-height: 34px; margin-bottom: 1px;">
                    Galti bache se hi hoti hai. Please maaf kar de mujhe patidev. 
                </h1>
                <h3 style="color: black; font-size: 1000;line-height: 34px; margin-top: 0px; margin-bottom: 0px;">
                    Do you still love me?
                </h3>
                <div class="button-container">
                    <button id="buttonClick">Yes</button>
                    <button id="buttonClickNo">No</button>
                </div>

            </div>
        </div>
    </body>
    <script>
        const button = document.getElementById('buttonClick');
        button.addEventListener('click', () => {
            alert("I love you so much meri jaan (ek baar no pe click karke dekhlo)");
        });
        const buttonNo= document.getElementById('buttonClickNo');
        buttonNo.addEventListener('mouseover', () => {
            const container = document.querySelector('.container');
            const containerWidth = container.offsetWidth;
            const containerHeight = container.offsetHeight;
            const randomX = Math.random() * (containerWidth - buttonNo.offsetWidth);
            const randomY = Math.random() * (containerHeight - buttonNo.offsetHeight);
            buttonNo.style.position = 'absolute';
            buttonNo.style.left = `${randomX}px`;
            buttonNo.style.top = `${randomY}px`;

        })
    </script>


</html>
