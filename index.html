<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>ILY AARAV</title>
        <style>
        
    body, html {
    margin: 0;
    height: 100%; 
    }

    
    .container {
    display: flex;
    justify-content: center;
    align-items: center;   
    min-height: 100vh;      
    background-image: url('backgroundimg.png'); 
    }

     .tile {
    width: 600px;
    aspect-ratio: 1 / 1;
    background-color: #d400ff;
    background-size: cover;       
    background-position: center;  
    background-repeat: no-repeat; 

    border-radius: 16px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    padding: 20px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
    text-align: center;
    overflow: hidden;

    color: white; 
    text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.8);
    }
    .apologyButton {
    padding: 15px 30px;
    font-size: 1.2rem;
    color: #fff;
    background-color: #c257a2;
    text-decoration: none;
    border-radius: 5px;
    transition: background-color 0.3s ease;
}
</style>
    </head>
    <body>
        <div class="container">
            <div class="tile">
                <img src="us.png" alt ="Placeholder"/>
                <h2 style="font-size: 1.1rem; line-height: 1.5;"> You see this cute ass man I am holding? <br>
                    Well, thats my pyara sa boyfriend and I love him so much!!
                </h2>
            </div>
        </div>
        <div class="container">
            <div class ="tile">
                <img src="kissing.jpeg" alt="Placeholder"/>
                <a href="apology_page.html" class="apologyButton">But I did something to make the love of my life sad...</a>
            </div>
        </div>
        <script>
    const items = document.querySelectorAll('.tile');
    const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        } 
    });
}, {threshold: 0.15});
items.forEach((item) => {
    observer.observe(item);
});
</script>
    </body>

</html>
